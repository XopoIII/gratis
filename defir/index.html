  <script>
    (function () {
      var revealed = false;
      function reveal() {
        if (revealed) return;
        revealed = true;
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            document.documentElement.classList.add('site-ready');
            setTimeout(function () { document.documentElement.classList.add('site-loaded'); }, 500);
          });
        });
      }
      var loadPromise = (document.readyState === 'complete')
        ? Promise.resolve()
        : new Promise(function (r) { window.addEventListener('load', r, { once: true }); });
      var fontsPromise = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
      var minVisiblePromise = new Promise(function (r) { setTimeout(r, 900); });
      Promise.all([loadPromise, fontsPromise, minVisiblePromise]).then(reveal);
      setTimeout(reveal, 4500);
    })();
  </script>
