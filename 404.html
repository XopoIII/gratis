<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>404 — страница не найдена | Агатис Интегра</title>
  <meta name="description" content="Страница не найдена. Вернуться на главную — каталог книг автора Агатис Интегра."/>
  <meta name="robots" content="noindex, follow"/>
  <link rel="canonical" href="https://againte.gratis/"/>
  <style>
    @font-face{font-family:'Russo One';src:url('/fonts/russo-one-cyrillic.woff2') format('woff2');unicode-range:U+0400-045F,U+0490-0491,U+04B0-04B1,U+2116;font-display:swap;}
    @font-face{font-family:'PT Mono';src:url('/fonts/pt-mono-cyrillic.woff2') format('woff2');unicode-range:U+0400-045F,U+0490-0491,U+04B0-04B1,U+2116;font-display:swap;}
    :root{--bg:#ECE1C4;--paper:#F3EACF;--ink:#2A1D18;--rule:#3A2A1C;--accent:#8B2E1F;}
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:var(--bg);color:var(--ink);font-family:'PT Mono','Courier New',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    main{max-width:680px;padding:48px 32px;text-align:center;}
    .num{font-family:'Russo One','Impact',sans-serif;font-size:clamp(96px,18vw,200px);line-height:.85;letter-spacing:.04em;margin-bottom:24px;color:var(--accent);text-shadow:6px 6px 0 var(--ink);}
    h1{font-family:'Russo One','Impact',sans-serif;font-size:clamp(20px,3.4vw,28px);letter-spacing:.2em;text-transform:uppercase;margin-bottom:16px;}
    p{font-size:14px;line-height:1.7;margin-bottom:24px;color:var(--ink);}
    .rule{border:0;border-top:3px double var(--rule);margin:32px auto;max-width:200px;}
    .back{display:inline-block;padding:14px 28px;border:2px solid var(--ink);background:var(--paper);color:var(--ink);text-decoration:none;font-size:12px;letter-spacing:.2em;text-transform:uppercase;transition:all .15s;}
    .back:hover{background:var(--ink);color:var(--paper);}
    .meta{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--rule);margin-top:24px;}
  </style>
</head>
<body>
  <main>
    <div class="num">404</div>
    <h1>Страница не найдена</h1>
    <p>Такой главы пока не написано. Может быть, она ещё пишется — или потерялась в Ржави.<br/>Вернитесь на главную — там весь каталог книг.</p>
    <hr class="rule"/>
    <a class="back" href="/">← на главную</a>
    <p class="meta">© Агатис Интегра · самиздат · постапок</p>
  </main>
</body>
</html>
